name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: GUT Tests
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.7-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          GODOT_ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          curl -L "$GODOT_URL" -o "$GODOT_ZIP"
          unzip -q "$GODOT_ZIP"
          chmod +x "Godot_v${GODOT_VERSION}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot

      - name: Prepare runtime directories
        shell: bash
        run: mkdir -p .godot

      - name: Import project resources
        shell: bash
        run: godot --headless --path . --import

      - name: Run GUT tests
        shell: bash
        run: |
          godot --headless --path . --log-file .godot/gut.log --script res://addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json -gdir=res://tests -ginclude_subdirs -gexit -gexit_on_success

  build-linux:
    name: Export Linux Build
    needs: test
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.7-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v4.7-stable_linux.x86_64.zip" -o "Godot_v4.7-stable_linux.x86_64.zip"
          unzip -q "Godot_v4.7-stable_linux.x86_64.zip"
          chmod +x "Godot_v4.7-stable_linux.x86_64"
          sudo mv "Godot_v4.7-stable_linux.x86_64" /usr/local/bin/godot

      - name: Install export templates
        shell: bash
        run: |
          set -euo pipefail
          template_zip="Godot_v${GODOT_VERSION}_export_templates.tpz"
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${template_zip}" -o "$template_zip"
          templatesDir="$HOME/.local/share/godot/export_templates/4.7.stable"
          mkdir -p "$templatesDir"
          tmpDir="$(mktemp -d)"
          unzip -q "$template_zip" -d "$tmpDir"
          cp -R "$tmpDir/templates/." "$templatesDir"

      - name: Prepare build directories
        shell: bash
        run: mkdir -p builds/linux

      - name: Import project resources
        shell: bash
        run: godot --headless --path . --import

      - name: Export project
        shell: bash
        run: godot --headless --path . --export-release "Linux" "builds/linux/Wizard Chess.x86_64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: builds/linux

  build-windows:
    name: Export Windows Build
    needs: test
    runs-on: windows-latest

    env:
      GODOT_VERSION: "4.7-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        shell: pwsh
        run: |
          $zip = "Godot_v4.7-stable_win64.exe.zip"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION/$zip" -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath .
          $env:GODOT_EXE = Join-Path $PWD "Godot_v4.7-stable_win64.exe"

      - name: Install export templates
        shell: pwsh
        run: |
          $templateZip = "Godot_v$env:GODOT_VERSION`_export_templates.tpz"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION/$templateZip" -OutFile $templateZip
          $templatesDir = Join-Path $env:APPDATA "Godot\export_templates\4.7.stable"
          New-Item -ItemType Directory -Force -Path $templatesDir | Out-Null
          $tmpDir = Join-Path $env:RUNNER_TEMP "godot_templates"
          Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null
          Expand-Archive -LiteralPath $templateZip -DestinationPath $tmpDir -Force
          Copy-Item -Path (Join-Path $tmpDir "templates\*") -Destination $templatesDir -Recurse -Force

      - name: Prepare build directories
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path builds\windows | Out-Null

      - name: Import project resources
        shell: pwsh
        run: .\Godot_v4.7-stable_win64.exe --headless --path . --import

      - name: Export project
        shell: pwsh
        run: .\Godot_v4.7-stable_win64.exe --headless --path . --export-release "Windows Desktop" "builds/windows/Wizard Chess.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: builds/windows
